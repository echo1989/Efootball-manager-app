<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>eFootball Manager</title>
    
    <!-- Tailwind CSS per lo stile -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome per le icone (sostituisce Lucide) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel per compilare il codice React nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Previene il pull-to-refresh su mobile e fissa lo sfondo */
        body { overscroll-behavior-y: contain; background-color: #0f172a; }
        /* Nasconde le freccette nei campi numerici */
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="text-slate-200 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- CONFIGURAZIONI INIZIALI ---
        const RUOLI = ['PT', 'DC', 'TS', 'TD', 'MED', 'CC', 'CLD', 'CLS', 'TRQ', 'SP', 'ESA', 'EDA', 'P'];
        const STILI_GIOCO = ['Nessuno', 'Opportunista', 'Senza palla', 'Rapace d\'area', 'Fulcro di gioco', 'Ala prolifica', 'Regista creativo', 'Classico N° 10', 'Giocatore chiave', 'Specialista di cross', 'Taglio al centro', 'Tra le linee', 'Onnipresente', 'Incontrista', 'Collante', 'Sviluppo', 'Incursore', 'Terzino offensivo', 'Terzino difensivo', 'Portiere offensivo', 'Portiere difensivo'];
        const STATI = ['OK', 'IN VENDITA', 'VENDUTO', 'SVINCOLATO', 'NUOVO ACQUISTO'];

        function App() {
          const [view, setView] = useState('dashboard');
          const [editingPlayer, setEditingPlayer] = useState(null);
          const [playerToDelete, setPlayerToDelete] = useState(null);

          // --- STATO SQUADRA ---
          const [teamConfig, setTeamConfig] = useState({
            name: 'FC eFootball',
            capital: 5000000,
            stadiumCost: 200000,
            youthCost: 100000,
            maxOverall: 1735,
            includeFixedExpenses: true
          });

          // --- FUNZIONI DI FORMATTAZIONE FORM ---
          const formatNumber = (value) => {
            if (value === undefined || value === null) return '0';
            return Number(value).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
          };

          const parseCurrency = (value) => {
            if (!value) return 0;
            return Number(value.toString().replace(/\./g, ''));
          };

          const handleCurrencyInput = (e) => {
            let rawValue = e.target.value.replace(/\D/g, '');
            if (!rawValue) {
              e.target.value = '';
              return;
            }
            e.target.value = formatNumber(rawValue);
          };

          // --- STATO GIOCATORI ---
          const [players, setPlayers] = useState([
            { id: 1, name: 'M. Maignan', role: 'PT', age: 28, overall: 87, foot: 'Dx', style: 'Portiere offensivo', salary: 150000, releaseCost: 0, status: 'OK' },
            { id: 2, name: 'T. Hernández', role: 'TS', age: 26, overall: 85, foot: 'Sx', style: 'Terzino offensivo', salary: 120000, releaseCost: 0, status: 'OK' },
            { id: 3, name: 'R. Leão', role: 'ESA', age: 24, overall: 86, foot: 'Dx', style: 'Ala prolifica', salary: 180000, releaseCost: 0, status: 'IN VENDITA' },
            { id: 4, name: 'Nuovo Talento', role: 'TRQ', age: 20, overall: 79, foot: 'Dx', style: 'Regista creativo', salary: 60000, releaseCost: 0, status: 'NUOVO ACQUISTO' },
          ]);

          // --- LOGICA DI CALCOLO ---
          const calculations = useMemo(() => {
            const currentRoster = players.filter(p => p.status === 'OK' || p.status === 'IN VENDITA');
            const projectedRoster = players.filter(p => p.status === 'OK' || p.status === 'IN VENDITA' || p.status === 'NUOVO ACQUISTO');
            
            const currentSalaries = currentRoster.reduce((sum, p) => sum + p.salary, 0);
            const projectedSalaries = projectedRoster.reduce((sum, p) => sum + p.salary, 0);

            const releaseCosts = players.filter(p => p.status === 'SVINCOLATO').reduce((sum, p) => sum + p.releaseCost, 0);

            const fixedExpenses = teamConfig.includeFixedExpenses ? (teamConfig.stadiumCost + teamConfig.youthCost) : 0;

            const currentAvailableCapital = teamConfig.capital - fixedExpenses - (currentSalaries / 2) - releaseCosts;
            const projectedAvailableCapital = teamConfig.capital - fixedExpenses - (projectedSalaries / 2) - releaseCosts;

            const currentVG = currentRoster.reduce((sum, p) => sum + p.overall, 0);
            const projectedVG = projectedRoster.reduce((sum, p) => sum + p.overall, 0);

            return {
              currentSalaries,
              projectedSalaries,
              releaseCosts,
              currentAvailableCapital,
              projectedAvailableCapital,
              currentVG,
              projectedVG,
              isOverVG: projectedVG > teamConfig.maxOverall
            };
          }, [players, teamConfig]);

          // --- HANDLERS ---
          const toggleFixedExpenses = () => setTeamConfig(prev => ({ ...prev, includeFixedExpenses: !prev.includeFixedExpenses }));

          const handleSaveTeamConfig = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            setTeamConfig(prev => ({
              ...prev,
              name: formData.get('name'),
              capital: parseCurrency(formData.get('capital')),
              stadiumCost: parseCurrency(formData.get('stadiumCost')),
              youthCost: parseCurrency(formData.get('youthCost')),
              maxOverall: Number(formData.get('maxOverall'))
            }));
            setView('dashboard');
          };

          const handleSavePlayer = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const playerData = {
              id: editingPlayer ? editingPlayer.id : Date.now(),
              name: formData.get('name'),
              role: formData.get('role'),
              age: Number(formData.get('age')),
              overall: Number(formData.get('overall')),
              foot: formData.get('foot'),
              style: formData.get('style'),
              salary: parseCurrency(formData.get('salary')),
              releaseCost: parseCurrency(formData.get('releaseCost')),
              status: formData.get('status')
            };

            if (editingPlayer) {
              setPlayers(players.map(p => p.id === editingPlayer.id ? playerData : p));
            } else {
              setPlayers([...players, playerData]);
            }
            setView('dashboard');
            setEditingPlayer(null);
          };

          const handleQuickStatusChange = (id, newStatus) => setPlayers(players.map(p => p.id === id ? { ...p, status: newStatus } : p));
          const openEditPlayer = (player) => { setEditingPlayer(player); setView('playerForm'); };
          const confirmDelete = (id) => { setPlayers(players.filter(p => p.id !== id)); setPlayerToDelete(null); };

          // --- COMPONENTI UI ---
          const formatCurrency = (value) => '€ ' + formatNumber(value);

          const renderDashboard = () => (
            <div className="space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                
                {/* Card Finanze */}
                <div className="bg-slate-800 p-5 rounded-2xl shadow-lg border border-slate-700">
                  <div className="flex items-center gap-2 mb-4 text-emerald-400">
                    <i className="fas fa-dollar-sign text-xl"></i>
                    <h2 className="text-xl font-bold">Resoconto Finanziario</h2>
                  </div>
                  <div className="space-y-3 text-sm">
                    <div className="flex justify-between text-slate-400">
                      <span>Capitale Iniziale:</span>
                      <span>{formatCurrency(teamConfig.capital)}</span>
                    </div>
                    <div className="flex justify-between items-center text-slate-400">
                      <div className="flex items-center gap-2">
                        <span>Spese Fisse (Stadio + Cantera):</span>
                        <button 
                          onClick={toggleFixedExpenses} 
                          className={`text-[10px] px-2 py-0.5 rounded font-bold transition-colors ${teamConfig.includeFixedExpenses ? 'bg-emerald-900 text-emerald-400 hover:bg-emerald-800' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}
                        >
                          {teamConfig.includeFixedExpenses ? 'INCLUSE' : 'ESCLUSE'}
                        </button>
                      </div>
                      <span className={teamConfig.includeFixedExpenses ? "text-red-400" : "text-slate-500 line-through"}>
                        -{formatCurrency(teamConfig.stadiumCost + teamConfig.youthCost)}
                      </span>
                    </div>
                    
                    <div className="flex justify-between items-center text-slate-400">
                      <span>Costi di Svincolo:</span>
                      <span className={calculations.releaseCosts > 0 ? "text-red-400 font-medium" : "text-slate-400"}>
                        -{formatCurrency(calculations.releaseCosts)}
                      </span>
                    </div>

                    <div className="h-px bg-slate-700 my-2"></div>
                    
                    <div className="flex justify-between items-center">
                      <span>Tot. Ingaggi (Attuali):</span>
                      <span className="font-semibold">{formatCurrency(calculations.currentSalaries)}</span>
                    </div>
                    <div className="flex justify-between items-center text-slate-300">
                      <span>Capitale Disp. (Attuale):</span>
                      <span className="font-bold text-lg text-emerald-400">{formatCurrency(calculations.currentAvailableCapital)}</span>
                    </div>

                    <div className="h-px bg-slate-700 my-2 border-dashed border-t"></div>
                    
                    <div className="flex justify-between items-center text-amber-200">
                      <span>Tot. Ingaggi (Proiettati):</span>
                      <span>{formatCurrency(calculations.projectedSalaries)}</span>
                    </div>
                    <div className="flex justify-between items-center text-amber-200">
                      <span>Capitale Disp. (Proiettato):</span>
                      <span className="font-bold text-lg">{formatCurrency(calculations.projectedAvailableCapital)}</span>
                    </div>
                  </div>
                </div>

                {/* Card Overall / VG */}
                <div className={`p-5 rounded-2xl shadow-lg border ${calculations.isOverVG ? 'bg-red-900/20 border-red-500/50' : 'bg-slate-800 border-slate-700'}`}>
                  <div className={`flex items-center gap-2 mb-4 ${calculations.isOverVG ? 'text-red-400' : 'text-blue-400'}`}>
                    <i className="fas fa-chart-line text-xl"></i>
                    <h2 className="text-xl font-bold">Valutazione Globale (VG)</h2>
                  </div>
                  
                  <div className="flex items-end justify-between mb-6">
                    <div>
                      <p className="text-slate-400 text-sm mb-1">Limite Max Squadra</p>
                      <p className="text-2xl font-bold text-slate-200">{teamConfig.maxOverall}</p>
                    </div>
                    <div className="text-right">
                      <p className="text-slate-400 text-sm mb-1">VG Attuale</p>
                      <p className="text-2xl font-bold text-blue-400">{calculations.currentVG}</p>
                    </div>
                  </div>

                  <div className="bg-slate-900/50 p-4 rounded-xl">
                    <div className="flex justify-between items-center">
                      <span className="text-amber-200 font-medium">VG Proiettato:</span>
                      <span className={`text-2xl font-bold ${calculations.isOverVG ? 'text-red-400' : 'text-amber-400'}`}>
                        {calculations.projectedVG}
                      </span>
                    </div>
                    {calculations.isOverVG && (
                      <div className="mt-2 flex items-center gap-2 text-red-400 text-sm">
                        <i className="fas fa-exclamation-triangle"></i>
                        <span>Attenzione: Hai superato il limite di VG!</span>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* Lista Giocatori */}
              <div className="bg-slate-800 rounded-2xl shadow-lg border border-slate-700 overflow-hidden">
                <div className="p-4 border-b border-slate-700 flex justify-between items-center">
                  <h2 className="text-xl font-bold flex items-center gap-2"><i className="fas fa-users text-lg"></i> Rosa Giocatori ({players.length})</h2>
                  <button onClick={() => { setEditingPlayer(null); setView('playerForm'); }} className="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium flex items-center gap-2 transition">
                    <i className="fas fa-plus"></i> Aggiungi
                  </button>
                </div>
                
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-[600px]">
                    <thead>
                      <tr className="bg-slate-900/50 text-slate-400 text-xs uppercase tracking-wider">
                        <th className="p-3 font-medium">Giocatore</th>
                        <th className="p-3 font-medium text-center">Ruolo</th>
                        <th className="p-3 font-medium text-center">VG</th>
                        <th className="p-3 font-medium">Ingaggio</th>
                        <th className="p-3 font-medium">Stato</th>
                        <th className="p-3 font-medium text-center">Azioni</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-700/50 text-sm">
                      {players.map(player => (
                        <tr key={player.id} className="hover:bg-slate-700/30 transition">
                          <td className="p-3">
                            <div className="font-bold text-slate-200">{player.name}</div>
                            <div className="text-xs text-slate-400">{player.age} anni • {player.foot} • {player.style}</div>
                          </td>
                          <td className="p-3 text-center">
                            <span className="bg-slate-700 text-slate-300 px-2 py-1 rounded text-xs font-bold">{player.role}</span>
                          </td>
                          <td className="p-3 text-center font-bold text-blue-400">{player.overall}</td>
                          <td className="p-3 text-slate-300">
                            <div>{formatCurrency(player.salary)}</div>
                            {player.releaseCost > 0 && <div className="text-xs text-red-400">Svincolo: {formatCurrency(player.releaseCost)}</div>}
                          </td>
                          <td className="p-3">
                            <select 
                              value={player.status}
                              onChange={(e) => handleQuickStatusChange(player.id, e.target.value)}
                              className={`bg-slate-900 border border-slate-600 rounded-lg text-xs p-1.5 font-medium focus:ring-emerald-500 focus:border-emerald-500
                                ${player.status === 'OK' ? 'text-emerald-400' : ''}
                                ${player.status === 'IN VENDITA' ? 'text-amber-400' : ''}
                                ${player.status === 'NUOVO ACQUISTO' ? 'text-blue-400' : ''}
                                ${player.status === 'VENDUTO' || player.status === 'SVINCOLATO' ? 'text-slate-500' : ''}
                              `}
                            >
                              {STATI.map(s => <option key={s} value={s}>{s}</option>)}
                            </select>
                          </td>
                          <td className="p-3 text-center">
                            <div className="flex items-center justify-center gap-3 text-lg">
                              <button onClick={() => openEditPlayer(player)} className="text-slate-400 hover:text-white transition" title="Modifica">
                                <i className="fas fa-edit"></i>
                              </button>
                              <button onClick={() => setPlayerToDelete(player.id)} className="text-slate-400 hover:text-red-400 transition" title="Elimina">
                                <i className="fas fa-trash"></i>
                              </button>
                            </div>
                          </td>
                        </tr>
                      ))}
                      {players.length === 0 && (
                        <tr><td colSpan="6" className="p-8 text-center text-slate-500">Nessun giocatore in rosa. Aggiungine uno!</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );

          const renderTeamSettings = () => (
            <div className="max-w-2xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700">
              <div className="flex items-center gap-3 mb-6 border-b border-slate-700 pb-4">
                <i className="fas fa-cog text-blue-400 text-2xl"></i>
                <h2 className="text-2xl font-bold">Impostazioni Squadra</h2>
              </div>
              <form onSubmit={handleSaveTeamConfig} className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-slate-400 mb-1">Nome Squadra</label>
                  <input type="text" name="name" defaultValue={teamConfig.name} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Capitale Disponibile (€)</label>
                    <input type="text" name="capital" defaultValue={formatNumber(teamConfig.capital)} onChange={handleCurrencyInput} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Limite Overall Squadra</label>
                    <input type="number" name="maxOverall" defaultValue={teamConfig.maxOverall} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Costo Gestione Stadio (€)</label>
                    <input type="text" name="stadiumCost" defaultValue={formatNumber(teamConfig.stadiumCost)} onChange={handleCurrencyInput} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Costo Cantera (€)</label>
                    <input type="text" name="youthCost" defaultValue={formatNumber(teamConfig.youthCost)} onChange={handleCurrencyInput} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                  </div>
                </div>
                <div className="pt-4 flex gap-3">
                  <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-500 text-white p-3 rounded-lg font-bold transition flex justify-center items-center gap-2">
                    <i className="fas fa-check"></i> Salva Impostazioni
                  </button>
                  <button type="button" onClick={() => setView('dashboard')} className="px-6 bg-slate-700 hover:bg-slate-600 text-white p-3 rounded-lg font-bold transition">
                    Annulla
                  </button>
                </div>
              </form>
            </div>
          );

          const renderPlayerForm = () => (
            <div className="max-w-3xl mx-auto bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700">
              <div className="flex items-center gap-3 mb-6 border-b border-slate-700 pb-4">
                <i className="fas fa-users text-emerald-400 text-2xl"></i>
                <h2 className="text-2xl font-bold">{editingPlayer ? 'Modifica Giocatore' : 'Nuovo Giocatore'}</h2>
              </div>
              <form onSubmit={handleSavePlayer} className="space-y-4">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="md:col-span-3">
                    <label className="block text-sm font-medium text-slate-400 mb-1">Nome</label>
                    <input type="text" name="name" defaultValue={editingPlayer?.name} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                  </div>
                  
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Ruolo</label>
                    <select name="role" defaultValue={editingPlayer?.role || 'CC'} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white">
                      {RUOLI.map(r => <option key={r} value={r}>{r}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Overall (VG)</label>
                    <input type="number" name="overall" defaultValue={editingPlayer?.overall || 70} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Età</label>
                    <input type="number" name="age" defaultValue={editingPlayer?.age || 20} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Piede Preferito</label>
                    <select name="foot" defaultValue={editingPlayer?.foot || 'Dx'} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white">
                      <option value="Dx">Destro (Dx)</option>
                      <option value="Sx">Sinistro (Sx)</option>
                    </select>
                  </div>
                  <div className="md:col-span-2">
                    <label className="block text-sm font-medium text-slate-400 mb-1">Stile Giocatore</label>
                    <select name="style" defaultValue={editingPlayer?.style || 'Nessuno'} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white">
                      {STILI_GIOCO.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Ingaggio (€)</label>
                    <input type="text" name="salary" defaultValue={formatNumber(editingPlayer?.salary || 0)} onChange={handleCurrencyInput} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Costo Svincolo (€)</label>
                    <input type="text" name="releaseCost" defaultValue={formatNumber(editingPlayer?.releaseCost || 0)} onChange={handleCurrencyInput} required className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-400 mb-1">Stato Mercato</label>
                    <select name="status" defaultValue={editingPlayer?.status || 'OK'} className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-white font-bold text-amber-400">
                      {STATI.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                </div>
                
                <div className="pt-4 flex gap-3">
                  <button type="submit" className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white p-3 rounded-lg font-bold transition flex justify-center items-center gap-2">
                    <i className="fas fa-check"></i> {editingPlayer ? 'Salva Modifiche' : 'Aggiungi in Rosa'}
                  </button>
                  <button type="button" onClick={() => { setView('dashboard'); setEditingPlayer(null); }} className="px-6 bg-slate-700 hover:bg-slate-600 text-white p-3 rounded-lg font-bold transition">
                    Annulla
                  </button>
                </div>
              </form>
            </div>
          );

          return (
            <div className="min-h-screen bg-slate-900 text-slate-200 font-sans pb-10">
              {/* Navbar Mobile/Desktop */}
              <nav className="bg-slate-950 border-b border-slate-800 sticky top-0 z-10 shadow-md">
                <div className="max-w-6xl mx-auto px-4">
                  <div className="flex justify-between items-center h-16">
                    <div className="flex items-center gap-3">
                      <div className="bg-emerald-500 p-2 rounded-lg text-slate-900">
                        <i className="fas fa-chart-line text-xl font-bold"></i>
                      </div>
                      <span className="font-bold text-xl tracking-tight hidden sm:block">{teamConfig.name} Manager</span>
                      <span className="font-bold text-xl tracking-tight sm:hidden">eF Manager</span>
                    </div>
                    <div className="flex gap-2">
                      <button 
                        onClick={() => setView('dashboard')} 
                        className={`p-2 rounded-lg text-sm font-medium transition ${view === 'dashboard' ? 'bg-slate-800 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'}`}
                      >
                        Dashboard
                      </button>
                      <button 
                        onClick={() => setView('teamSettings')} 
                        className={`p-2 rounded-lg text-sm font-medium transition flex items-center gap-2 ${view === 'teamSettings' ? 'bg-slate-800 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-800/50'}`}
                      >
                        <i className="fas fa-cog"></i> <span className="hidden sm:inline">Impostazioni</span>
                      </button>
                    </div>
                  </div>
                </div>
              </nav>

              {/* Main Content Area */}
              <main className="max-w-6xl mx-auto px-4 mt-6">
                {view === 'dashboard' && renderDashboard()}
                {view === 'teamSettings' && renderTeamSettings()}
                {view === 'playerForm' && renderPlayerForm()}
              </main>

              {/* Modal Conferma Eliminazione */}
              {playerToDelete && (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                  <div className="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 max-w-sm w-full">
                    <h3 className="text-xl font-bold text-white mb-2">Elimina Giocatore</h3>
                    <p className="text-slate-400 mb-6">Sei sicuro di voler eliminare definitivamente questo giocatore? L'operazione non può essere annullata.</p>
                    <div className="flex gap-3">
                      <button onClick={() => confirmDelete(playerToDelete)} className="flex-1 bg-red-600 hover:bg-red-500 text-white py-2 rounded-lg font-bold transition">
                        Elimina
                      </button>
                      <button onClick={() => setPlayerToDelete(null)} className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2 rounded-lg font-bold transition">
                        Annulla
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
